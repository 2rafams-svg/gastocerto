<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f0f0f"/>
<title>Gasto Certo</title>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="icon" type="image/png" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;
  --accent:#c8f04a;--text:#f0f0f0;--text2:#888;--text3:#555;
  --red:#ff4f4f;--orange:#ff9f43;--radius:16px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

html, body {
  touch-action: pan-y;
}
button{touch-action:manipulation}

/* ===== LOGO ===== */
.logo-mark{flex-shrink:0}

/* ===== PIN SCREEN ===== */
#pin-screen{
  position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 40px calc(40px + var(--safe-bot));
}
.pin-logo{margin-bottom:20px}
.pin-title{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:8px;text-align:center}
.pin-title span{color:var(--accent)}
.pin-subtitle{font-size:14px;color:var(--text2);margin-bottom:40px;text-align:center}
.pin-dots{display:flex;gap:16px;margin-bottom:48px}
.pin-dot{
  width:18px;height:18px;border-radius:50%;border:2px solid var(--border);
  transition:all .2s;background:transparent;
}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-key{
  aspect-ratio:1;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:22px;font-weight:500;cursor:pointer;transition:background .1s,transform .1s;
  display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
.pin-key:active{background:var(--surface2);transform:scale(.93)}
.pin-key.del{font-size:18px;color:var(--text2)}
.pin-key.empty{border:none;background:transparent;pointer-events:none}
.pin-error-msg{margin-top:20px;font-size:13px;color:var(--red);min-height:20px;text-align:center}

/* ===== APP ===== */
#app{display:flex;flex-direction:column;height:100%}

.header{padding:calc(var(--safe-top) + 18px) 20px 14px;background:var(--bg);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.title-wrap{display:flex;align-items:center;gap:8px}
.app-title{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.5px}
.app-title span{color:var(--accent)}
.month-pill{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px}
.month-pill svg{width:14px;height:14px;stroke:var(--text2)}

.tabs{display:flex;gap:4px;padding:14px 20px 0;background:var(--bg);position:sticky;top:65px;z-index:99}
.tab{flex:1;padding:9px 0;border-radius:100px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;background:var(--surface);color:var(--text2)}
.tab.active{background:var(--accent);color:#0f0f0f}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ===== RESUMO GERAL ===== */
.summary-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin:0 20px 4px;
}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.summary-block{text-align:center}
.summary-label{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.summary-num{font-size:14px;font-weight:600}
.summary-num.positive{color:var(--accent)}
.summary-num.negative{color:var(--red)}

/* ===== CAROUSEL HOME ===== */
#home-content{display:flex;flex-direction:column;height:100%}
.cat-carousel-wrap{flex:1;overflow:hidden;position:relative}
.cat-carousel{
  display:flex;height:100%;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.cat-slide{
  min-width:100%;height:100%;overflow-y:auto;
  padding:16px 20px calc(80px + var(--safe-bot));
  -webkit-overflow-scrolling:touch;
}

/* dots */
.carousel-dots{
  display:flex;justify-content:center;gap:6px;
  padding:10px 0 6px;background:var(--bg);
}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s}
.cdot.active{width:18px;border-radius:100px;background:var(--accent)}

/* cat nav arrows */
.cat-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;padding-bottom:8px;background:var(--bg);
}
.cat-nav-name{font-family:'DM Serif Display',serif;font-size:17px;flex:1;text-align:center}
.cat-nav-btn{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);font-size:18px;user-select:none;
}
.cat-nav-btn:active{background:var(--surface2)}
.cat-nav-btn.disabled{opacity:.25;pointer-events:none}

/* ===== CAT CARD ===== */
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.cat-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);border-radius:4px 0 0 4px}
.cat-card.over-budget::before{background:var(--red)}
.cat-card.warning::before{background:var(--orange)}
.cat-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.cat-name{font-family:'DM Serif Display',serif;font-size:18px}
.cat-values{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.val-block{background:var(--surface2);border-radius:10px;padding:10px}
.val-label{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.val-num{font-size:16px;font-weight:600}
.val-num.positive{color:var(--accent)}
.val-num.negative{color:var(--red)}
.val-num.budget{color:var(--text)}
.val-num.spent{color:var(--text2)}
.progress-bar{height:4px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;border-radius:100px;background:var(--accent);transition:width .4s ease}
.progress-fill.warning{background:var(--orange)}
.progress-fill.danger{background:var(--red)}
.forecast{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:10px}
.forecast strong{color:var(--text2);font-style:normal}
.add-expense-btn{width:100%;padding:10px;border-radius:10px;border:1px dashed var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;transition:all .2s}
.add-expense-btn svg{width:14px;height:14px;stroke:currentColor}
.expense-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.expense-item:last-child{border-bottom:none}
.expense-left{flex:1}
.expense-name{font-size:14px;font-weight:500}
.expense-date{font-size:11px;color:var(--text3);margin-top:2px}
.expense-right{display:flex;align-items:center;gap:10px}
.expense-value{font-size:14px;font-weight:600}
.expense-actions{display:flex;gap:4px}
.exp-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.exp-btn svg{width:12px;height:12px;stroke:var(--text2)}

/* ===== HISTORICO ===== */
.hist-cat-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.hist-cat-name{font-weight:500;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.hist-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:3px}
.hist-row span:last-child{color:var(--text);font-weight:500}
.month-block{margin-bottom:20px}
.month-title{font-family:'DM Serif Display',serif;font-size:16px;margin-bottom:10px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* badges */
.badge{
  display:inline-flex;align-items:center;gap:4px;border-radius:100px;
  padding:3px 10px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.badge.ok{background:#c8f04a18;color:var(--accent);border:1px solid #c8f04a44}
.badge.saved{background:#c8f04a18;color:var(--accent);border:1px solid #c8f04a44}
.badge.over{background:#ff4f4f18;color:var(--red);border:1px solid #ff4f4f44}

/* gráfico */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.chart-title{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-bars{display:flex;align-items:flex-end;gap:10px;height:110px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.chart-bar{width:100%;max-width:38px;border-radius:6px 6px 2px 2px;background:var(--accent);min-height:4px;transition:height .4s ease}
.chart-bar.over{background:var(--red)}
.chart-val{font-size:9px;color:var(--text3)}
.chart-label{font-size:10px;color:var(--text2);font-weight:500}

/* ===== CATEGORIAS (drag) ===== */
.cat-list{padding:16px 20px calc(80px + var(--safe-bot))}
.cat-manage-item{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;
  gap:12px;cursor:default;transition:box-shadow .2s,opacity .2s;
  touch-action:none;user-select:none;
}
.cat-manage-item.dragging{opacity:.4}
.cat-manage-item.drag-over{box-shadow:0 0 0 2px var(--accent)}
.drag-handle{color:var(--text3);font-size:18px;cursor:grab;padding:2px 4px;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
.cat-manage-info{flex:1}
.cat-manage-name{font-weight:500}
.cat-manage-budget{font-size:13px;color:var(--text2);margin-top:2px}
.icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.icon-btn svg{width:14px;height:14px;stroke:var(--text2)}

/* ===== FAB ===== */
.fab{position:fixed;bottom:calc(20px + var(--safe-bot));right:20px;width:56px;height:56px;border-radius:100px;border:none;background:var(--accent);color:#0f0f0f;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(200,240,74,.3);z-index:200;transition:transform .15s}
.fab:active{transform:scale(.92)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px calc(24px + var(--safe-bot));width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:20px}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 20px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
select.form-input{cursor:pointer}
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#0f0f0f;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;margin-top:8px}
.close-month-btn{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
.close-month-btn svg{width:16px;height:16px;stroke:var(--accent)}
.month-adj-item{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.month-adj-name{font-size:14px;font-weight:500;margin-bottom:8px}
.month-adj-row{display:flex;align-items:center;gap:10px}
.month-adj-row .form-input{flex:1;padding:8px 12px;font-size:14px}

/* ===== MISC ===== */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-size:14px}
.loading{text-align:center;padding:60px 20px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(90px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.success{border-color:var(--accent);color:var(--accent)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);display:inline-block;margin-left:6px;animation:pulse 1s infinite alternate}
@keyframes pulse{from{opacity:.3}to{opacity:1}}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <svg class="pin-logo" width="72" height="72" viewBox="0 0 120 120">
    <rect width="120" height="120" rx="28" fill="#1a1a1a"/>
    <circle cx="60" cy="60" r="34" fill="none" stroke="#c8f04a" stroke-width="7"/>
    <path d="M46 61 L56 71 L76 49" fill="none" stroke="#c8f04a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div class="pin-title">Gasto<span>Certo</span></div>
  <div class="pin-subtitle">Digite seu PIN para entrar</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid" id="pin-grid">
    <button class="pin-key" data-key="1">1</button>
    <button class="pin-key" data-key="2">2</button>
    <button class="pin-key" data-key="3">3</button>
    <button class="pin-key" data-key="4">4</button>
    <button class="pin-key" data-key="5">5</button>
    <button class="pin-key" data-key="6">6</button>
    <button class="pin-key" data-key="7">7</button>
    <button class="pin-key" data-key="8">8</button>
    <button class="pin-key" data-key="9">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" data-key="0">0</button>
    <button class="pin-key del" data-key="del">⌫</button>
  </div>
  <div class="pin-error-msg" id="pin-error"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex:1;flex-direction:column;height:100%">
  <div class="header">
    <div class="header-row">
      <div class="title-wrap">
        <svg class="logo-mark" width="26" height="26" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="44" fill="none" stroke="#c8f04a" stroke-width="10"/>
          <path d="M42 62 L55 75 L80 46" fill="none" stroke="#c8f04a" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="app-title">Gasto<span>Certo</span></div>
      </div>
      <div class="month-pill" onclick="openMonthPicker()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="current-month-label">---</span>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('home',this)">Início</button>
    <button class="tab" onclick="switchTab('categorias',this)">Categorias</button>
    <button class="tab" onclick="switchTab('historico',this)">Histórico</button>
  </div>
  <div class="content" id="content" style="flex:1;overflow-y:auto">
    <div class="loading"><div class="spinner"></div>Carregando...</div>
  </div>
  <button class="fab" id="fab" onclick="onFab()" style="display:none">+</button>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ===================== CONFIG =====================
const SUPABASE_URL = 'https://asnuusgwtsjpwuaakfuc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Z46thUwaqpXRR8i2PxZWzQ_oG2eJ3yK';
const CORRECT_PIN = () => String(new Date().getFullYear());
const CACHE_KEY = 'gc-cache-v1';

// ===================== HAPTIC =====================
function vib(ms=8){ if(navigator.vibrate) navigator.vibrate(ms); }

// ===================== PIN =====================
// v1.5: entrada via pointerdown (sem delay de click) + sem bloqueio de toques rápidos
let pinValue = '';
document.getElementById('pin-grid').addEventListener('pointerdown', e => {
  const key = e.target.closest('.pin-key');
  if(!key || key.classList.contains('empty')) return;
  e.preventDefault();
  vib();
  if(key.dataset.key === 'del') pinDel();
  else pinInput(key.dataset.key);
});
function pinInput(d){
  if(pinValue.length>=4) return;
  pinValue += d;
  updatePinDots();
  if(pinValue.length===4) setTimeout(checkPin, 120);
}
function pinDel(){
  pinValue = pinValue.slice(0,-1);
  updatePinDots();
  document.getElementById('pin-error').textContent='';
}
function updatePinDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('d'+i);
    d.classList.remove('filled','error');
    if(i<pinValue.length) d.classList.add('filled');
  }
}
function checkPin(){
  if(pinValue === CORRECT_PIN()){
    vib(20);
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    init();
  } else {
    vib(60);
    for(let i=0;i<4;i++) document.getElementById('d'+i).classList.replace('filled','error');
    document.getElementById('pin-error').textContent='PIN incorreto. Tente novamente.';
    setTimeout(()=>{
      pinValue='';
      updatePinDots();
      document.getElementById('pin-error').textContent='';
    }, 900);
  }
}

// ===================== API =====================
async function sbFetch(path, opts={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    ...opts,
    headers:{
      'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,
      'Content-Type':'application/json','Prefer':'return=representation',
      ...(opts.headers||{})
    }
  });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  const t=await res.text(); return t?JSON.parse(t):null;
}
const api={
  getCategories:()=>sbFetch('categories?order=position.asc'),
  insertCategory:(d)=>sbFetch('categories',{method:'POST',body:JSON.stringify(d)}),
  updateCategory:(id,d)=>sbFetch(`categories?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(d)}),
  deleteCategory:(id)=>sbFetch(`categories?id=eq.${id}`,{method:'DELETE',headers:{Prefer:'return=minimal'}}),
  getMonths:()=>sbFetch('months?order=key.desc'),
  upsertMonth:(d)=>sbFetch('months',{method:'POST',body:JSON.stringify(d),headers:{Prefer:'resolution=merge-duplicates,return=representation'}}),
  closeMonth:(key)=>sbFetch(`months?key=eq.${key}`,{method:'PATCH',body:JSON.stringify({closed:true})}),
  getExpenses:(mk)=>sbFetch(`expenses?month_key=eq.${mk}&order=date.desc`),
  getAllExpenses:()=>sbFetch('expenses?order=date.desc'),
  insertExpense:(d)=>sbFetch('expenses',{method:'POST',body:JSON.stringify(d)}),
  updateExpense:(id,d)=>sbFetch(`expenses?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(d)}),
  deleteExpense:(id)=>sbFetch(`expenses?id=eq.${id}`,{method:'DELETE',headers:{Prefer:'return=minimal'}}),
};

// ===================== STATE =====================
let categories=[], months=[], currentMonthKey='', viewMonthKey='', expenses=[], currentTab='home', currentCatIdx=0;
const uid=()=>Math.random().toString(36).slice(2,9);
const monthKeyOf=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const monthLabel=key=>{ if(!key)return''; const[y,m]=key.split('-'); return `${['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+m-1]} ${y}`; };
const nextMonthKey=key=>{ const[y,m]=key.split('-').map(Number); return monthKeyOf(new Date(y,m,1)); };
const brl=v=>`R$ ${parseFloat(v).toFixed(2).replace('.',',')}`;

// ===================== CACHE LOCAL (render otimista) =====================
function saveCache(){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify({categories,months,expenses,currentMonthKey,ts:Date.now()})); }catch{}
}
function loadCache(){
  try{
    const raw=localStorage.getItem(CACHE_KEY);
    if(!raw) return false;
    const c=JSON.parse(raw);
    if(!c.categories||!c.months) return false;
    categories=c.categories; months=c.months; expenses=c.expenses||[];
    currentMonthKey=c.currentMonthKey; viewMonthKey=c.currentMonthKey;
    return true;
  }catch{ return false; }
}

// ===================== INIT =====================
async function init(){
  // 1) Render instantâneo a partir do cache (se houver)
  const hadCache = loadCache();
  if(hadCache){
    render();
    document.getElementById('current-month-label').insertAdjacentHTML('afterend','<span class="sync-dot" id="sync-dot"></span>');
  }
  // 2) Busca dados frescos em paralelo
  try{
    const [cats, mons] = await Promise.all([api.getCategories(), api.getMonths()]);
    categories=cats; months=mons;
    const now=monthKeyOf(new Date());
    if(!months.find(m=>m.key===now)){ await api.upsertMonth({key:now,closed:false}); months=await api.getMonths(); }
    currentMonthKey=now;
    if(!hadCache || !months.find(m=>m.key===viewMonthKey)) viewMonthKey=now;
    expenses=await api.getExpenses(viewMonthKey);
    saveCache();
    document.getElementById('sync-dot')?.remove();
    render();
  }catch(e){
    document.getElementById('sync-dot')?.remove();
    if(!hadCache){
      document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erro ao conectar.<br><small>${e.message}</small></div></div>`;
    } else {
      showToast('Sem conexão — exibindo dados locais.','error');
    }
  }
}

// ===================== BADGES =====================
function badgeHtml(diff){
  if(Math.abs(diff)<0.005) return `<span class="badge ok">✓ Na meta</span>`;
  if(diff>0) return `<span class="badge saved">▼ Economizou ${brl(diff)}</span>`;
  return `<span class="badge over">▲ Estourou ${brl(Math.abs(diff))}</span>`;
}

// ===================== RENDER =====================
function render(){
  document.getElementById('current-month-label').textContent=monthLabel(viewMonthKey);
  const isNow=viewMonthKey===currentMonthKey;
  document.getElementById('fab').style.display=(currentTab==='home'||currentTab==='categorias')&&isNow?'flex':'none';
  const el=document.getElementById('content');
  if(currentTab==='home') renderHome(el);
  else if(currentTab==='categorias') renderCategorias(el);
  else renderHistorico(el);
}

// ===== HOME (carousel) =====
function renderHome(el){
  const isNow=viewMonthKey===currentMonthKey;
  const mdata=months.find(m=>m.key===viewMonthKey);
  if(categories.length===0){
    el.innerHTML=`<div style="padding:16px 20px">${isNow&&mdata&&!mdata.closed?closeMonthBtnHtml():''}<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">Nenhuma categoria ainda.</div></div></div>`;
    return;
  }
  if(currentCatIdx>=categories.length) currentCatIdx=0;

  // Resumo geral do mês
  const totalBudget=categories.reduce((s,c)=>s+parseFloat(c.budget),0);
  const totalSpent=expenses.reduce((s,e)=>s+parseFloat(e.value),0);
  const totalAvail=totalBudget-totalSpent;
  const totalPct=totalBudget>0?Math.min((totalSpent/totalBudget)*100,100):0;
  const summaryHtml=`<div class="summary-card">
    <div class="summary-grid">
      <div class="summary-block"><div class="summary-label">Orçamento</div><div class="summary-num">${brl(totalBudget)}</div></div>
      <div class="summary-block"><div class="summary-label">Gasto</div><div class="summary-num" style="color:var(--text2)">${brl(totalSpent)}</div></div>
      <div class="summary-block"><div class="summary-label">Disponível</div><div class="summary-num ${totalAvail>=0?'positive':'negative'}">${brl(totalAvail)}</div></div>
    </div>
    <div class="progress-bar" style="margin-bottom:0"><div class="progress-fill ${totalAvail<0?'danger':totalPct>75?'warning':''}" style="width:${totalPct}%"></div></div>
  </div>`;

  const slidesHtml = categories.map((cat,i)=>buildSlide(cat,isNow)).join('');
  const dotsHtml = categories.map((_,i)=>`<div class="cdot${i===currentCatIdx?' active':''}" onclick="goToSlide(${i})"></div>`).join('');

  el.innerHTML=`<div id="home-content" style="display:flex;flex-direction:column;height:100%">
    ${isNow&&mdata&&!mdata.closed?`<div style="padding:12px 20px 0">${closeMonthBtnHtml()}</div>`:''}
    <div style="padding-top:12px">${summaryHtml}</div>
    <div class="cat-nav" style="padding-top:10px">
      <div class="cat-nav-btn${currentCatIdx===0?' disabled':''}" onclick="goToSlide(${currentCatIdx-1})">‹</div>
      <div class="cat-nav-name">${categories[currentCatIdx].name}</div>
      <div class="cat-nav-btn${currentCatIdx===categories.length-1?' disabled':''}" onclick="goToSlide(${currentCatIdx+1})">›</div>
    </div>
    <div class="carousel-dots">${dotsHtml}</div>
    <div class="cat-carousel-wrap" id="carousel-wrap">
      <div class="cat-carousel" id="cat-carousel" style="transform:translateX(-${currentCatIdx*100}%)">
        ${slidesHtml}
      </div>
    </div>
  </div>`;

  setupSwipe();
}

function buildSlide(cat, isNow){
  const catExps=expenses.filter(e=>e.cat_id===cat.id);
  const spent=catExps.reduce((s,e)=>s+parseFloat(e.value),0);
  const available=cat.budget-spent;
  const pct=Math.min((spent/cat.budget)*100,100);
  const isOver=available<0, isWarn=!isOver&&pct>75;
  const today=new Date(), dom=today.getDate();
  let forecast='';
  if(isNow&&spent>0&&dom>0){
    const dr=spent/dom;
    if(dr>0&&!isOver){
      const end=new Date(today); end.setDate(dom+Math.floor(available/dr));
      forecast=`Nesse ritmo, o saldo acaba em <strong>${end.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</strong>`;
    } else if(isOver) forecast=`Orçamento estourado em <strong>${brl(Math.abs(available))}</strong>`;
  }
  const expHtml=catExps.map(e=>`<div class="expense-item">
    <div class="expense-left">
      <div class="expense-name">${e.name}</div>
      <div class="expense-date">${new Date(e.date+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})}</div>
    </div>
    <div class="expense-right">
      <div class="expense-value">${brl(e.value)}</div>
      ${isNow?`<div class="expense-actions">
        <div class="exp-btn" onclick="openEditExpense('${e.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
        <div class="exp-btn" style="border-color:#ff4f4f44" onclick="confirmDeleteExpense('${e.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" style="stroke:#ff4f4f"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></div>
      </div>`:''}
    </div>
  </div>`).join('');

  return `<div class="cat-slide">
    <div class="cat-card ${isOver?'over-budget':isWarn?'warning':''}">
      <div class="cat-values">
        <div class="val-block"><div class="val-label">Orçamento</div><div class="val-num budget">${brl(cat.budget)}</div></div>
        <div class="val-block"><div class="val-label">Gasto</div><div class="val-num spent">${brl(spent)}</div></div>
        <div class="val-block" style="grid-column:1/-1"><div class="val-label">Disponível</div><div class="val-num ${available>=0?'positive':'negative'}">${brl(available)}</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill ${isOver?'danger':isWarn?'warning':''}" style="width:${pct}%"></div></div>
      ${forecast?`<div class="forecast">${forecast}</div>`:''}
      ${expHtml}
      ${isNow?`<button class="add-expense-btn" onclick="openAddExpense('${cat.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar gasto
      </button>`:''}
    </div>
  </div>`;
}

function closeMonthBtnHtml(){
  return `<button class="close-month-btn" onclick="openCloseMonth()">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
    Fechar Mês e Abrir Próximo
  </button>`;
}

function goToSlide(i){
  if(i<0||i>=categories.length) return;
  vib(5);
  currentCatIdx=i;
  const carousel=document.getElementById('cat-carousel');
  if(carousel) carousel.style.transform=`translateX(-${i*100}%)`;
  document.querySelectorAll('.cdot').forEach((d,j)=>d.classList.toggle('active',j===i));
  const nameEl=document.querySelector('.cat-nav-name');
  if(nameEl) nameEl.textContent=categories[i].name;
  document.querySelectorAll('.cat-nav-btn').forEach((btn,j)=>{
    btn.classList.toggle('disabled', j===0?i===0:i===categories.length-1);
    btn.onclick=j===0?()=>goToSlide(i-1):()=>goToSlide(i+1);
  });
}

// Swipe
function setupSwipe(){
  const wrap=document.getElementById('carousel-wrap');
  if(!wrap) return;
  let startX=0,startY=0,dragging=false,locked=false;
  wrap.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true;locked=false},{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(!dragging) return;
    const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
    if(!locked){ if(Math.abs(dx)>Math.abs(dy)){locked='h';} else {locked='v';dragging=false;} }
    if(locked==='h') e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchend',e=>{
    if(!dragging) return; dragging=false;
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)>40){ if(dx<0) goToSlide(currentCatIdx+1); else goToSlide(currentCatIdx-1); }
  });
}

// ===== CATEGORIAS (drag & drop) =====
function renderCategorias(el){
  if(categories.length===0){
    el.innerHTML=`<div class="cat-list"><div class="empty"><div class="empty-icon">📂</div><div class="empty-text">Nenhuma categoria ainda.</div></div></div>`;
    return;
  }
  el.innerHTML=`<div class="cat-list" id="cat-list">
    ${categories.map(cat=>`
    <div class="cat-manage-item" draggable="true" data-id="${cat.id}" id="cmi-${cat.id}">
      <div class="drag-handle" title="Arrastar">⠿</div>
      <div class="cat-manage-info">
        <div class="cat-manage-name">${cat.name}</div>
        <div class="cat-manage-budget">${brl(cat.budget)}/mês</div>
      </div>
      <div style="display:flex;gap:8px">
        <div class="icon-btn" onclick="openEditCategory('${cat.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
        <div class="icon-btn" style="border-color:#ff4f4f44" onclick="confirmDeleteCategory('${cat.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" style="stroke:#ff4f4f"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></div>
      </div>
    </div>`).join('')}
  </div>`;
  setupDragDrop();
}

function setupDragDrop(){
  const list=document.getElementById('cat-list');
  if(!list) return;
  let dragSrc=null;

  // Desktop drag
  list.querySelectorAll('.cat-manage-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{
      dragSrc=item; item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>{ item.classList.remove('dragging'); list.querySelectorAll('.cat-manage-item').forEach(i=>i.classList.remove('drag-over')); });
    item.addEventListener('dragover',e=>{ e.preventDefault(); if(item!==dragSrc){ list.querySelectorAll('.cat-manage-item').forEach(i=>i.classList.remove('drag-over')); item.classList.add('drag-over'); } });
    item.addEventListener('drop',e=>{ e.preventDefault(); if(dragSrc&&item!==dragSrc){ reorderCats(dragSrc.dataset.id, item.dataset.id); } });
  });

  // Touch drag
  let touchItem=null, clone=null, touchOffY=0;
  list.querySelectorAll('.drag-handle').forEach(handle=>{
    handle.addEventListener('touchstart',e=>{
      vib();
      touchItem=handle.closest('.cat-manage-item');
      const r=touchItem.getBoundingClientRect();
      touchOffY=e.touches[0].clientY-r.top;
      clone=touchItem.cloneNode(true);
      clone.style.cssText=`position:fixed;left:${r.left}px;width:${r.width}px;top:${r.top}px;z-index:999;opacity:.85;pointer-events:none;background:var(--surface);border:1px solid var(--accent);border-radius:12px;`;
      document.body.appendChild(clone);
      touchItem.classList.add('dragging');
    },{passive:true});
    handle.addEventListener('touchmove',e=>{
      if(!clone) return;
      e.preventDefault();
      const y=e.touches[0].clientY-touchOffY;
      clone.style.top=y+'px';
      const els=[...list.querySelectorAll('.cat-manage-item:not(.dragging)')];
      list.querySelectorAll('.cat-manage-item').forEach(i=>i.classList.remove('drag-over'));
      const over=els.find(i=>{ const r=i.getBoundingClientRect(); return e.touches[0].clientY>r.top&&e.touches[0].clientY<r.bottom; });
      if(over) over.classList.add('drag-over');
    },{passive:false});
    handle.addEventListener('touchend',e=>{
      if(!clone) return;
      clone.remove(); clone=null;
      if(touchItem) touchItem.classList.remove('dragging');
      const over=list.querySelector('.cat-manage-item.drag-over');
      if(over&&touchItem&&over!==touchItem) reorderCats(touchItem.dataset.id, over.dataset.id);
      list.querySelectorAll('.cat-manage-item').forEach(i=>i.classList.remove('drag-over'));
      touchItem=null;
    });
  });
}

async function reorderCats(srcId, targetId){
  const srcIdx=categories.findIndex(c=>c.id===srcId);
  const tgtIdx=categories.findIndex(c=>c.id===targetId);
  if(srcIdx<0||tgtIdx<0) return;
  const moved=categories.splice(srcIdx,1)[0];
  categories.splice(tgtIdx,0,moved);
  try{
    await Promise.all(categories.map((c,i)=>api.updateCategory(c.id,{position:i})));
    saveCache();
    showToast('Ordem salva!','success');
  }catch{ showToast('Erro ao salvar ordem.','error'); }
  renderCategorias(document.getElementById('content'));
}

// ===== HISTORICO (v1.5: fetch único + badges + gráfico) =====
function renderHistorico(el){
  el.innerHTML=`<div style="padding:16px 20px calc(80px + var(--safe-bot))"><div class="loading"><div class="spinner"></div>Carregando...</div></div>`;
  renderHistoricoAsync(el);
}
async function renderHistoricoAsync(el){
  let allExps=[];
  try{ allExps=await api.getAllExpenses(); }
  catch{ el.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erro ao carregar histórico.</div></div>`; return; }

  // Agrupar por mês
  const byMonth={};
  allExps.forEach(e=>{ (byMonth[e.month_key]=byMonth[e.month_key]||[]).push(e); });

  const totalBudget=categories.reduce((s,c)=>s+parseFloat(c.budget),0);

  // Gráfico: gasto total por mês (ordem cronológica, máx 6 meses)
  const chartMonths=months.filter(m=>byMonth[m.key]).slice(0,6).reverse();
  let chartHtml='';
  if(chartMonths.length>1){
    const totals=chartMonths.map(m=>byMonth[m.key].reduce((s,e)=>s+parseFloat(e.value),0));
    const max=Math.max(...totals, totalBudget, 1);
    chartHtml=`<div class="chart-card">
      <div class="chart-title">Gasto total por mês</div>
      <div class="chart-bars">
        ${chartMonths.map((m,i)=>{
          const h=Math.max((totals[i]/max)*100,4);
          const over=totalBudget>0&&totals[i]>totalBudget;
          return `<div class="chart-col">
            <div class="chart-val">${totals[i]>=1000?(totals[i]/1000).toFixed(1).replace('.',',')+'k':Math.round(totals[i])}</div>
            <div class="chart-bar${over?' over':''}" style="height:${h}%"></div>
            <div class="chart-label">${monthLabel(m.key).split(' ')[0]}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  let html=chartHtml;
  for(const month of months){
    const exps=byMonth[month.key];
    if(!exps||exps.length===0) continue;
    const monthSpent=exps.reduce((s,e)=>s+parseFloat(e.value),0);
    const monthDiff=totalBudget-monthSpent;
    html+=`<div class="month-block">
      <div class="month-title">${monthLabel(month.key)}
        ${month.closed?'<span style="font-size:11px;color:var(--accent);font-family:DM Sans">✓ Fechado</span>':''}
        ${badgeHtml(monthDiff)}
      </div>`;
    categories.forEach(cat=>{
      const ce=exps.filter(e=>e.cat_id===cat.id);
      if(!ce.length) return;
      const spent=ce.reduce((s,e)=>s+parseFloat(e.value),0);
      const avail=cat.budget-spent;
      html+=`<div class="hist-cat-item">
        <div class="hist-cat-name"><span>${cat.name}</span>${badgeHtml(avail)}</div>
        <div class="hist-row"><span>Orçamento</span><span>${brl(cat.budget)}</span></div>
        <div class="hist-row"><span>Gasto</span><span>${brl(spent)}</span></div>
        <div class="hist-row"><span>Saldo</span><span style="color:${avail>=0?'var(--accent)':'var(--red)'}">${brl(avail)}</span></div>
        <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
          ${ce.map(e=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:3px 0">
            <span>${e.name} <span style="color:var(--text3)">${new Date(e.date+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</span></span>
            <span style="color:var(--text)">${brl(e.value)}</span>
          </div>`).join('')}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  el.innerHTML=`<div style="padding:16px 20px calc(80px + var(--safe-bot))">${html||'<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Nenhum gasto registrado ainda.</div></div>'}</div>`;
}

function closeModalOverlay(e){ if(e.target===document.getElementById('modal-overlay')) _closeModal(); }

function openEditExpense(expId){

  openModal(`<div class="modal-title">Editar Gasto</div>
    <div class="form-group"><label class="form-label">Categoria</label>
      <select class="form-input" id="f-catId">${categories.map(c=>`<option value="${c.id}"${c.id===e.cat_id?' selected':''}>${c.name}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Descrição</label>
      <input class="form-input" id="f-name" value="${e.name}" autocomplete="off"/></div>
    <div class="form-group"><label class="form-label">Valor (R$)</label>
      <input class="form-input" id="f-value" type="number" inputmode="decimal" value="${e.value}" step="0.01" min="0"/></div>
    <div class="form-group"><label class="form-label">Data</label>
      <input class="form-input" id="f-date" type="date" value="${e.date}"/></div>
    <button class="btn-primary" id="btn-save-exp" onclick="saveExpense('${expId}')">Salvar</button>
    <button class="btn-secondary" onclick="_closeModal()">Cancelar</button>`);
}

async function saveExpense(expId){
  const catId=document.getElementById('f-catId').value;
  const name=document.getElementById('f-name').value.trim();
  const value=parseFloat(document.getElementById('f-value').value);
  const date=document.getElementById('f-date').value;
  if(!name||isNaN(value)||value<=0||!date){ showToast('Preencha todos os campos.','error'); return; }
  const btn=document.getElementById('btn-save-exp'); btn.disabled=true; btn.textContent='Salvando...';
  try{
    if(expId) await api.updateExpense(expId,{cat_id:catId,name,value,date});
    else await api.insertExpense({id:uid(),cat_id:catId,month_key:viewMonthKey,name,value,date});
    expenses=await api.getExpenses(viewMonthKey);
    saveCache();
    vib(15);
    _closeModal(); render(); showToast('Salvo!','success');
  }catch{ showToast('Erro ao salvar.','error'); btn.disabled=false; btn.textContent='Salvar'; }
}

async function confirmDeleteExpense(expId){
  if(!confirm('Deletar este gasto?')) return;
  try{ await api.deleteExpense(expId); expenses=expenses.filter(e=>e.id!==expId); saveCache(); render(); showToast('Removido.','success'); }
  catch{ showToast('Erro ao deletar.','error'); }
}

function openAddCategory(){
  openModal(`<div class="modal-title">Nova Categoria</div>
    <div class="form-group"><label class="form-label">Nome</label>
      <input class="form-input" id="f-cname" placeholder="Ex: Academia" autocomplete="off"/></div>
    <div class="form-group"><label class="form-label">Orçamento mensal (R$)</label>
      <input class="form-input" id="f-cbudget" type="number" inputmode="decimal" placeholder="0,00" step="0.01" min="0"/></div>
    <button class="btn-primary" id="btn-save-cat" onclick="saveCategory(null)">Salvar</button>
    <button class="btn-secondary" onclick="_closeModal()">Cancelar</button>`);
}

function openEditCategory(catId){
  const cat=categories.find(c=>c.id===catId); if(!cat) return;
  openModal(`<div class="modal-title">Editar Categoria</div>
    <div class="form-group"><label class="form-label">Nome</label>
      <input class="form-input" id="f-cname" value="${cat.name}" autocomplete="off"/></div>
    <div class="form-group"><label class="form-label">Orçamento mensal (R$)</label>
      <input class="form-input" id="f-cbudget" type="number" inputmode="decimal" value="${cat.budget}" step="0.01" min="0"/></div>
    <button class="btn-primary" id="btn-save-cat" onclick="saveCategory('${catId}')">Salvar</button>
    <button class="btn-secondary" onclick="_closeModal()">Cancelar</button>`);
}

async function saveCategory(catId){
  const name=document.getElementById('f-cname').value.trim();
  const budget=parseFloat(document.getElementById('f-cbudget').value);
  if(!name||isNaN(budget)||budget<=0){ showToast('Preencha todos os campos.','error'); return; }
  const btn=document.getElementById('btn-save-cat'); btn.disabled=true; btn.textContent='Salvando...';
  try{
    if(catId) await api.updateCategory(catId,{name,budget});
    else await api.insertCategory({id:uid(),name,budget,position:categories.length});
    categories=await api.getCategories();
    saveCache();
    vib(15);
    _closeModal(); render(); showToast('Categoria salva!','success');
  }catch{ showToast('Erro ao salvar.','error'); btn.disabled=false; btn.textContent='Salvar'; }
}

async function confirmDeleteCategory(catId){
  if(!confirm('Deletar esta categoria?')) return;
  try{ await api.deleteCategory(catId); categories=categories.filter(c=>c.id!==catId); saveCache(); render(); showToast('Removida.','success'); }
  catch{ showToast('Erro ao deletar.','error'); }
}

function openCloseMonth(){
  const next=nextMonthKey(currentMonthKey);
  openModal(`<div class="modal-title">Fechar Mês</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Ajuste os orçamentos para <strong style="color:var(--text)">${monthLabel(next)}</strong>:</p>
    ${categories.map(cat=>`<div class="month-adj-item">
      <div class="month-adj-name">${cat.name}</div>
      <div class="month-adj-row"><span style="font-size:12px;color:var(--text3);white-space:nowrap">Orçamento (R$)</span>
        <input class="form-input" id="adj-${cat.id}" type="number" inputmode="decimal" value="${cat.budget}" step="0.01" min="0"/></div>
    </div>`).join('')}
    <button class="btn-primary" id="btn-close-month" onclick="confirmCloseMonth('${next}')" style="margin-top:8px">Fechar e Abrir ${monthLabel(next)}</button>
    <button class="btn-secondary" onclick="_closeModal()">Cancelar</button>`);
}

async function confirmCloseMonth(nextKey){
  const btn=document.getElementById('btn-close-month'); btn.disabled=true; btn.textContent='Processando...';
  try{
    for(const cat of categories){ const inp=document.getElementById(`adj-${cat.id}`); if(inp){const v=parseFloat(inp.value);if(!isNaN(v)&&v>0) await api.updateCategory(cat.id,{budget:v});} }
    await api.closeMonth(currentMonthKey);
    await api.upsertMonth({key:nextKey,closed:false});
    categories=await api.getCategories(); months=await api.getMonths();
    currentMonthKey=nextKey; viewMonthKey=nextKey; currentCatIdx=0;
    expenses=await api.getExpenses(viewMonthKey);
    saveCache();
    vib(20);
    _closeModal(); render(); showToast(`${monthLabel(nextKey)} aberto!`,'success');
  }catch{ showToast('Erro ao fechar mês.','error'); btn.disabled=false; btn.textContent='Tentar novamente'; }
}

function openMonthPicker(){
  openModal(`<div class="modal-title">Selecionar Mês</div>
    ${months.map(m=>`<div onclick="selectMonth('${m.key}')" style="padding:14px 16px;border-radius:10px;margin-bottom:8px;background:${m.key===viewMonthKey?'var(--accent)':'var(--surface2)'};color:${m.key===viewMonthKey?'#0f0f0f':'var(--text)'};font-weight:${m.key===viewMonthKey?600:400};cursor:pointer">
      ${monthLabel(m.key)} ${m.closed?'<span style="font-size:11px;opacity:.6">Fechado</span>':''}
    </div>`).join('')}`);
}

async function selectMonth(key){
  viewMonthKey=key; currentCatIdx=0;
  _closeModal();
  expenses=await api.getExpenses(viewMonthKey);
  render();
}

function onFab(){
  vib();
  if(currentTab==='categorias') openAddCategory();
  else{ if(!categories.length){ showToast('Crie uma categoria primeiro.','error'); return; } openAddExpense(categories[currentCatIdx]?.id||categories[0].id); }
}

async function switchTab(tab,btn){
  vib(5);
  currentTab=tab; currentCatIdx=0;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  viewMonthKey=currentMonthKey;
  expenses=await api.getExpenses(viewMonthKey);
  render();
}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2500);
}

// v1.5: proteção de double-tap zoom SEM travar botões
// (era a causa do PIN lento: o preventDefault em touchend cancelava o click das teclas)
document.addEventListener('touchstart', function(e){
  if(e.touches.length > 1) e.preventDefault();
}, {passive: false});

let lastTap = 0;
document.addEventListener('touchend', function(e){
  // Elementos interativos ficam fora da proteção — toques rápidos são intencionais
  if(e.target.closest('button,.pin-key,.exp-btn,.icon-btn,.cat-nav-btn,.cdot,.tab,input,select,[onclick]')) { lastTap = Date.now(); return; }
  const now = Date.now();
  if(now - lastTap < 300) e.preventDefault();
  lastTap = now;
}, {passive: false});

// PWA: registrar service worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
